<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <title>تحدّي الـ HTML - كلوووب قابس</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        direction: rtl;
        text-align: right;
        padding: 20px;
        background-color: #f4f4f9;
      }
      .container {
        background-color: white;
        padding: 20px;
        border-radius: 8px;
        max-width: 500px;
        margin: 0 auto;
      }
      label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
      }
      input,
      select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        background-color: blue;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        margin-top: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- 1. استعمال الـ div كـ صندوق كبير يلrمّ الخدمة -->
    <div class="container">
      <h2>📝 إضافة مهمة جديدة في الـ Trello Clone</h2>
      <p>مرحباً بيكم في منصة المجمع. رجاءً عمّر الخانات بعناية.</p>

      <!-- 2. الـ Formulaire -->
      <form>
        <label>إسم المهمة:</label>
        <input type="text" placeholder="مثال: برمجة الـ Login باج..." />

        <label>حالة المهمة:</label>
        <select>
          <option>باش نبدو فيها (À faire)</option>
          <option>قاعدين نخدموا فيها (En cours)</option>
        </select>

        <!-- 3. استعمال الـ span لتلوين كلمة برك وسط السطر -->
        <p>
          تنبيه: هذه المهمة
          <span style="color: red; font-weight: bold">مستعجلة جداً</span> ولازم
          تكمل في وقتها!
        </p>

        <button type="submit">حفظ المهمة 🚀</button>
      </form>
    </div>
  </body>
</html>
